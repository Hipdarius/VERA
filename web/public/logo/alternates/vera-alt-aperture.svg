<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none" role="img" aria-label="VERA aperture iris, alternate concept">
  <title>VERA aperture iris</title>
  <desc>Hexagonal probe aperture: six triangular blades around a central hexagonal opening, with the LIF laser dash and the regolith sample dot inside.</desc>

  <polygon points="48,8 82.64,28 82.64,68 48,88 13.36,68 13.36,28"
           fill="#0a0d14" stroke="#38b3c4" stroke-width="1.4" stroke-linejoin="round"/>

  <g stroke="#38b3c4" stroke-width="0.8" stroke-linecap="round" opacity="0.7">
    <line x1="48" y1="8" x2="48" y2="36"/>
    <line x1="82.64" y1="28" x2="58.39" y2="42"/>
    <line x1="82.64" y1="68" x2="58.39" y2="54"/>
    <line x1="48" y1="88" x2="48" y2="60"/>
    <line x1="13.36" y1="68" x2="37.61" y2="54"/>
    <line x1="13.36" y1="28" x2="37.61" y2="42"/>
  </g>

  <polygon points="48,36 58.39,42 58.39,54 48,60 37.61,54 37.61,42"
           fill="#1a2230" stroke="#38b3c4" stroke-width="1.2" stroke-linejoin="round"/>

  <line x1="48" y1="38" x2="48" y2="48" stroke="#f5b840" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="1.6 1.2"/>

  <circle cx="48" cy="48" r="2.2" fill="#38b3c4"/>
  <circle cx="48" cy="48" r="1.2" fill="#f0f5f8"/>
</svg>
