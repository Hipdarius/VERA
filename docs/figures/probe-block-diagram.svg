<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" fill="none" role="img" aria-label="VERA probe block diagram"><title>VERA probe block diagram</title><desc>Five hardware blocks of the VERA probe — illumination ring, sample window, optical chain, ESP32 microcontroller, and USB-C tether — with arrows showing the data and light paths between them.</desc><rect width="720" height="360" fill="#0a0d14"/><text x="24" y="32" font-family="Inter,sans-serif" font-weight="600" font-size="14" fill="#f0f5f8" letter-spacing="2">VERA PROBE BLOCK DIAGRAM</text><g font-family="Inter,sans-serif" font-size="11" fill="#f0f5f8"><rect x="40" y="80" width="160" height="80" stroke="#f5b840" stroke-width="1.4" rx="2"/><text x="120" y="108" text-anchor="middle" font-weight="600">Illumination ring</text><text x="120" y="126" text-anchor="middle" fill="#9bb5c2" font-size="9">12 LEDs (385-940 nm)</text><text x="120" y="140" text-anchor="middle" fill="#9bb5c2" font-size="9">405 nm laser, 1050 nm</text><rect x="280" y="80" width="160" height="80" stroke="#38b3c4" stroke-width="1.4" rx="2"/><text x="360" y="108" text-anchor="middle" font-weight="600">Sample window</text><text x="360" y="126" text-anchor="middle" fill="#9bb5c2" font-size="9">Regolith puck</text><text x="360" y="140" text-anchor="middle" fill="#9bb5c2" font-size="9">Quartz cover</text><rect x="520" y="80" width="160" height="80" stroke="#38b3c4" stroke-width="1.4" rx="2"/><text x="600" y="108" text-anchor="middle" font-weight="600">Optical chain</text><text x="600" y="126" text-anchor="middle" fill="#9bb5c2" font-size="9">C12880MA + AS7265x</text><text x="600" y="140" text-anchor="middle" fill="#9bb5c2" font-size="9">+ InGaAs SWIR</text><rect x="280" y="220" width="160" height="80" stroke="#a78bfa" stroke-width="1.4" rx="2"/><text x="360" y="248" text-anchor="middle" font-weight="600">ESP32-S3</text><text x="360" y="266" text-anchor="middle" fill="#9bb5c2" font-size="9">240 MHz, 8 MB PSRAM</text><text x="360" y="280" text-anchor="middle" fill="#9bb5c2" font-size="9">FSM at 1 kHz</text><rect x="520" y="220" width="160" height="80" stroke="#94a3b8" stroke-width="1.4" rx="2"/><text x="600" y="248" text-anchor="middle" font-weight="600">USB-C tether</text><text x="600" y="266" text-anchor="middle" fill="#9bb5c2" font-size="9">JSON-Lines</text><text x="600" y="280" text-anchor="middle" fill="#9bb5c2" font-size="9">to laptop bridge</text></g></svg>
