; VERA ESP32-S3 Firmware
; Target: ESP32-S3-DevKitC-1 (Xtensa LX7, 320 KB SRAM, 8 MB PSRAM)
; Framework: Arduino (for rapid prototyping; migrate to ESP-IDF if
; we need finer timer control for the C12880MA clock).

[env:esp32s3]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200

; ArduinoJson for stack-allocated JSON serialization.
; No heap fragmentation from String or dynamic containers.
lib_deps =
    bblanchon/ArduinoJson@^7.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
